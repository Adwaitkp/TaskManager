version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # Backend API
  backend:
    build: ./backend
    container_name: task-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/task_manager
      - JWT_SECRET=your_super_secret_jwt_key
    depends_on:
      - mongodb

  # Frontend React App
  frontend:
    build: ./frontend
    container_name: task-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo-data: